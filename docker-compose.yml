services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: viewbeforebuy
    ports:
      - "5433:5432"
    volumes:
      - viewbeforebuy_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - viewbeforebuy_redis:/data

volumes:
  viewbeforebuy_pg:
  viewbeforebuy_redis:
