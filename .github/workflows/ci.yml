name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annule les runs précédents encore en cours sur la même réf
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-lint-test:
    name: Lint & Tests
    runs-on: ubuntu-latest

    env:
      # DATABASE_URL factice : nécessaire à `prisma generate` (postinstall).
      # Aucune connexion réelle n'est faite (tests isolés, sans DB/Redis).
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/viewbeforebuy?schema=public
      # Redis désactivé pendant les tests (client null, dégradation gracieuse).
      REDIS_URL: ""
      JWT_SECRET: ci-test-secret
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint & typecheck
        run: npm run lint

      - name: Run tests
        run: npm test
